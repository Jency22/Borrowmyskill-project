{% extends 'base.html' %}
{% load static %}

{% block title %}Leave a Review - BorrowMySkill{% endblock %}

{% block extra_head %}
<style>
    .review-wrapper {
        width: 100%;
        max-width: 550px;
        margin: 4rem auto;
        padding: 0 1rem;
    }
    .review-card {
        padding: 3rem;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        text-align: center;
    }
    .star-rating {
        display: flex;
        flex-direction: row-reverse;
        justify-content: center;
        gap: 0.5rem;
        margin: 2rem 0;
    }
    .star-rating input { display: none; }
    .star-rating label {
        font-size: 3rem;
        color: #cbd5e1;
        cursor: pointer;
        transition: color 0.2s ease, transform 0.2s;
    }
    .star-rating label:hover,
    .star-rating label:hover ~ label,
    .star-rating input:checked ~ label {
        color: #f59e0b;
    }
    .star-rating label:hover { transform: scale(1.15); }
    textarea {
        width: 100%;
        padding: 1rem;
        border: 2px solid #e2e8f0;
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 1rem;
        resize: vertical;
        min-height: 120px;
        margin-bottom: 2rem;
        transition: border-color 0.3s;
    }
    textarea:focus {
        outline: none;
        border-color: var(--primary);
    }
</style>
{% endblock %}

{% block content %}
<div class="review-wrapper">
    <a href="{% url 'my_bookings' %}" style="display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-light); font-weight: 600; margin-bottom: 1.5rem; text-decoration: none;">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        &larr; Back to Bookings
    </a>
    <div class="review-card glass">
        <h2 class="text-gradient" style="font-size: 2.2rem; margin-bottom: 0.5rem;">Rate your experience</h2>
        <p style="color: var(--text-light); font-size: 1.1rem;">How was the <b>{{ booking.skill.name }}</b> service?</p>
        <form method="POST">
            {% csrf_token %}
            <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5" required />
                <label for="star5" title="5 stars">★</label>
                <input type="radio" id="star4" name="rating" value="4" />
                <label for="star4" title="4 stars">★</label>
                <input type="radio" id="star3" name="rating" value="3" />
                <label for="star3" title="3 stars">★</label>
                <input type="radio" id="star2" name="rating" value="2" />
                <label for="star2" title="2 stars">★</label>
                <input type="radio" id="star1" name="rating" value="1" />
                <label for="star1" title="1 star">★</label>
            </div>
            <textarea name="comment" placeholder="Tell us what you liked (or didn't like)..." required></textarea>
            <button type="submit" class="btn btn-block" style="font-size: 1.2rem; padding: 1rem; border-radius: var(--radius-full); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);">
                Submit Review &rarr;
            </button>
        </form>
    </div>
</div>
{% endblock %}
