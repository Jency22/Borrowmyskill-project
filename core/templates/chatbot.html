<!-- Chatbot UI Widget -->
<style>
/* Chatbot Glassmorphism Aesthetics */
#chatbot-container {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 1000;
    font-family: 'Inter', sans-serif;
}

#chatbot-button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 8px 32px 0 rgba(110, 142, 251, 0.37);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    border: none;
    outline: none;
}

#chatbot-button:hover {
    transform: scale(1.1) translateY(-5px);
    box-shadow: 0 12px 40px 0 rgba(110, 142, 251, 0.6);
}

#chatbot-window {
    display: none;
    position: absolute;
    bottom: 80px;
    right: 0;
    width: 350px;
    height: 500px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    flex-direction: column;
    overflow: hidden;
    transform-origin: bottom right;
    animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes scaleIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

#chatbot-header {
    padding: 15px 20px;
    background: rgba(255, 255, 255, 0.4);
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    font-weight: 600;
    color: #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#chatbot-header span {
    font-size: 18px;
    letter-spacing: 0.5px;
}

#chatbot-close {
    cursor: pointer;
    font-size: 18px;
    color: #666;
    transition: color 0.2s;
}
#chatbot-close:hover { color: #111; }

#chatbot-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* Custom Scrollbar for messages */
#chatbot-messages::-webkit-scrollbar { width: 6px; }
#chatbot-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }

.chat-bubble {
    max-width: 80%;
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 16px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.chat-bubble.bot {
    background: rgba(255, 255, 255, 0.7);
    color: #333;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

.chat-bubble.user {
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

#chatbot-input-container {
    padding: 15px;
    background: rgba(255, 255, 255, 0.4);
    border-top: 1px solid rgba(255, 255, 255, 0.3);
    display: flex;
    gap: 10px;
}

#chatbot-input {
    flex: 1;
    padding: 14px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    background: rgba(255, 255, 255, 0.6);
    outline: none;
    font-size: 16px;
    color: #333;
    transition: background 0.3s;
}

#chatbot-input:focus {
    background: rgba(255, 255, 255, 0.9);
}

#chatbot-send {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #6e8efb;
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
}
#chatbot-send:hover { background: #5c7cfa; }

/* Typing indicator */
.typing-indicator {
    display: flex;
    gap: 4px;
    padding: 5px;
}
.typing-dot {
    width: 6px;
    height: 6px;
    background: #888;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
}
.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}
</style>

<div id="chatbot-container">
    <div id="chatbot-window">
        <div id="chatbot-header">
            <span>✨ AI Guide</span>
            <span id="chatbot-close">&times;</span>
        </div>
        <div id="chatbot-messages">
            <div class="chat-bubble bot">Hi there! 👋 How can I help you find the right skills today?</div>
        </div>
        <div id="chatbot-input-container">
            <input type="text" id="chatbot-input" placeholder="Ask something..." autocomplete="off">
            <button id="chatbot-send">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
    <button id="chatbot-button">
        <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </button>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const chatbotButton = document.getElementById('chatbot-button');
    const chatbotWindow = document.getElementById('chatbot-window');
    const chatbotClose = document.getElementById('chatbot-close');
    const chatbotInput = document.getElementById('chatbot-input');
    const chatbotSend = document.getElementById('chatbot-send');
    const chatbotMessages = document.getElementById('chatbot-messages');

    // Toggle Chat Window
    chatbotButton.addEventListener('click', () => {
        const isHidden = chatbotWindow.style.display === 'none' || chatbotWindow.style.display === '';
        chatbotWindow.style.display = isHidden ? 'flex' : 'none';
        if (isHidden) chatbotInput.focus();
    });

    chatbotClose.addEventListener('click', () => {
        chatbotWindow.style.display = 'none';
    });

    // Send Message Logic
    const appendMessage = (text, sender) => {
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-bubble ${sender}`;
        msgDiv.textContent = text;
        chatbotMessages.appendChild(msgDiv);
        chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
    };

    const showTypingIndicator = () => {
        const indicator = document.createElement('div');
        indicator.className = 'chat-bubble bot';
        indicator.id = 'typing-indicator-bubble';
        indicator.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        chatbotMessages.appendChild(indicator);
        chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
    };

    const removeTypingIndicator = () => {
        const indicator = document.getElementById('typing-indicator-bubble');
        if (indicator) indicator.remove();
    };

    const sendMessage = async () => {
        const message = chatbotInput.value.trim();
        if (!message) return;

        // Display user message
        appendMessage(message, 'user');
        chatbotInput.value = '';

        // Show typing indicator
        showTypingIndicator();

        try {
            const response = await fetch('/api/chatbot/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    // Using django relative path and CSRF exempt, so no explicit token needed
                },
                body: "message=" + encodeURIComponent(message)
            });

            const data = await response.json();
            
            removeTypingIndicator();
            if (data.reply) {
                appendMessage(data.reply, 'bot');
            } else {
                appendMessage("Sorry, I didn't understand that.", 'bot');
            }
        } catch (error) {
            console.error('Error:', error);
            removeTypingIndicator();
            appendMessage("Connection error. Please try again later.", 'bot');
        }
    };

    chatbotSend.addEventListener('click', sendMessage);
    chatbotInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
});
</script>
